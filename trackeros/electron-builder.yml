appId: com.sumeet.trackeros
productName: Tracker
directories:
  buildResources: assets
  output: release
files:
  - dist/**/*
  - electron/**/*
  - assets/**/*
  - "!**/*.md"
  - "!**/*.map"
  - "!**/test/**"
  - "!**/__tests__/**"
  - "!node_modules/**/{CHANGELOG.md,README.md,readme.md}"
  - "!node_modules/.cache"
compression: maximum
publish:
  provider: github
  owner: SumeetNayak-NITRR
  repo: trackeros
  releaseType: release
win:
  target: nsis
  icon: assets/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
